{% set version = "0.7.1" %}
{% set name = "glog" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/google/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 00e4a87e87b7e7612f519a41e491f16623b12423620006f59f5688bfd8d13b08

build:
  number: 0
  run_exports:
    # Recent releases have been stable
    # https://abi-laboratory.pro/index.php?view=timeline&l=glog
    - {{ pin_subpackage('glog', max_pin="x.x") }}

requirements:
  build:
    - cmake
    - ninja
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - gflags 2.3.0

test:
  commands:
    - test -f ${PREFIX}/lib/libglog${SHLIB_EXT}  # [unix]
    - if not exist %PREFIX%\\Library\\bin\\glog.dll exit 1  # [win]

about:
  home: https://github.com/google/glog
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: C++ implementation of the Google logging module.
  description: |
    Google Logging (glog) is a C++98 library that implements application-level logging. 
    The library provides logging APIs based on C++-style streams and various helper macros.
  doc_url: https://github.com/google/glog
  dev_url: https://github.com/google/glog

extra:
  recipe-maintainers:
    - jakirkham
    - xhochy
